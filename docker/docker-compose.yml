services:
  db:
    image: mysql:8.0
    container_name: mascotas_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mascotas_webapp
    ports:
      - "3306:3306"
    volumes:
      # Persistencia de datos de MySQL
      - ../mysql_data:/var/lib/mysql

      # Scripts SQL iniciales
      # Todo .sql que haya en DB/ se ejecutará la primera vez
      # que se cree la base de datos
      - ../DB:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin:5.2.1-apache
    container_name: mascotas_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"

  backend-app:
    build:
      context: ..
      dockerfile: ./php/Dockerfile
    container_name: mascotas_backend_app
    restart: unless-stopped
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Montamos todo src para que el proyecto completo esté accesible
      - ../src:/var/www/project

      # Configuración opcional de Xdebug
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    ports:
      - "3000:80"

      # Ejecuta al iniciar el contenedor:
      # 1. Activa mod_rewrite de Apache (necesario para rutas tipo /api/...)
      # 2. Cambia la ruta por defecto (/var/www/html) para que Apache sirva backend/public
      # 3. Arranca Apache en primer plano (necesario para que el contenedor no se cierre)
    command: >
      bash -lc "
      a2enmod rewrite &&
      sed -ri 's!/var/www/html!/var/www/project/backend/public!g' /etc/apache2/sites-available/*.conf &&
      sed -ri 's!/var/www/!/var/www/project/backend/public!g' /etc/apache2/apache2.conf /etc/apache2/conf-available/*.conf || true &&
      apache2-foreground
      "

  frontend-app:
    image: node:20
    container_name: mascotas_frontend_app
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - backend-app
    volumes:
      # Aquí vive el frontend separado
      - ../src/frontend:/app
    ports:
      - "4200:4200"

      # Ejecuta al iniciar el contenedor:
      # 1. Instala dependencias del proyecto (npm install)
      # 2. Arranca el servidor de desarrollo del frontend
      # 3. Usa --host 0.0.0.0 para que sea accesible desde el navegador fuera del contenedor
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
