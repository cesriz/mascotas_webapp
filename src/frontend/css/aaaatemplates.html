<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <style>
        
    /* Header */
    .reset-header-section {
        width: min(500px, 90vw);
        height: auto;
        margin: 0 auto;
        display: flex;
        border-radius: var(--radius-md) var(--radius-md) 0 0;
        background-color: var(--backgroundblue);
    }

    .reset-header-section h3 {
        width: 100%;
        text-align: center;
        padding: 1rem;
        font-size: var(--text-2md);
    }

    /* Body */
    .reset-body-section {
        width: min(500px, 90vw); 
        margin: 0 auto;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 20px;

        background-color: var(--backgroundblue);
        border-top: 1px solid var(--secondary);
        border-radius: 0 0 var(--radius-md) var(--radius-md);
        
        padding: 2rem;
    }

    #reset-pss input {
        margin-bottom: 1rem;
    }

    .reset-form-buttons {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 1rem;
    }

    /* --------Tablets y móviles--------- */
    @media (max-width: 768px) {
        button {
            max-width: 100%;
        }
    }

    @media (max-width: 480px) {
        h3 {
            font-size: 0.95rem;
        }

        button {
            padding: 0.5rem;
        }
    } 
    

    </style>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    
    <title>Mascotas webAPP</title>
</head>
<body>
    <app-navbar></app-navbar>

    <div id="success-div"></div>
    <div id="http-cat"></div>

    <div>
        <div class="reset-header-section">
            <h3>Restablecer contraseña</h3>
        </div>
        <div class="reset-body-section">
            <form id="reset-pss">
                <label for="forgot-correo">Nueva contraseña</label>
                <input type="password" id="password">

                <label for="forgot-correo">Repetir contraseña</label>
                <input type="password" id="password">

                <div class="reset-form-buttons"> 
                    <button class="button-primary" type="submit">RESTABLECER CONTRASEÑA</button>
                </div>
            </form>
        </div>
    </div>
    <app-footer></app-footer>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
