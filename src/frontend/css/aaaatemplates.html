<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        /* Switch para seleccionar el estado */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
            }

            .switch input {
            opacity: 0;
            width: 0;
            height: 0;
            }

            /* Fondo */
            .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: var(--primary);
            border-radius: var(--radius-md);
            transition: 0.3s;
            }

            /* Bolita */
            .slider::before {
            content: "";
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            top: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
            }

            /* Estado activo */
            input:checked + .slider {
            background-color: var(--secondary500);
            }

            input:checked + .slider::before {
            transform: translateX(24px);
            }

        /* Contenedores */
        .pet-create-data {
            width: min(600px, 90vw);
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .pet-create-data-section {
            background-color: var(--backgroundblue);
            border: 2px solid var(--primary);
            border-radius: var(--radius-md);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 1.5rem;
        }

        .pet-create-data-location {
            display: flex;
            flex-direction: column;
        }

        /* Títulos */
        .pet-create-title {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: var(--text-md);
            gap: 5px;
            margin-bottom: 10px;
            transform: translate(-10px,0);
        }

        .pet-create-title img {
            width: 24px;
            height: 24px;
        }

        /* Inputs */
        .pet-create-data-inputs {
            display: flex;
            flex-direction: column; 
            width: 100%;
            gap: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--inputbackground);
            border-radius: var(--radius-sm);
            font-family: inherit;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .reward-input {
            display: flex;
            margin-top: 10px;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.9rem;
        }

        .reward-input input {
            width: auto;
        }

        /* Fotografías */
        .foto-div {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            margin-top: -10px;
            margin-top:10px;
            padding: 20px;
            background-color: var(--inputbackground);
            border: 2px dashed var(--primary);
            border-radius: var(--radius-sm);
            
            transition: background 0.3s;
            cursor: pointer;
        }
            
        .foto-div:hover { background: rgba(0,0,0,0.05); }

        .foto-div img {
            width: 40px;
            height: 40px;
            opacity: 0.7;
        }

        #pet-create-data-foto { 
            display: none; 
        }

        #preview-img {
            display:none; 
            width: 100%;
            min-height: 200px;
            max-height: 180px; 
            object-fit: contain; 
            margin-top: 10px;
            background-color: var(--inputbackground);
            border-radius: var(--radius-sm);
        }

        /* Botones */
        .pet-create-data-buttons {
            width: auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            padding-top: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
            gap: 10px;
        }


        #pet-create-data-search-btn{
            max-width: 150px;
            margin-top: 10px;
            align-self: flex-end;
        }


        .pet-create-data-buttons button {
            flex: 1;
            max-width: 250px;
            padding: 10px;
        }


        /* --------Tablets y móviles--------- */
        @media (max-width: 600px) {
            .pet-create-data-buttons {
                flex-direction: column;
            }
            .pet-create-data-buttons button {
                max-width: 100%;
            }
            .pet-create-data {
                padding: 1.5rem;
            }
        }
    </style>

</head>
<body>

<div id="success-div"></div>
<form class="pet-create-data" id="pet-create-data-form">

        <label class="switch">
        <input type="checkbox" id="pet-creation-estado">
        <span class="slider"></span>
        </label>

        <div class="pet-create-data-section">
            <div class="pet-create-title">
                <img src="../assets/icons/streamline-plump--pet-paw.png">
                <h3>Datos de la mascota</h3>
            </div>

            <div class="pet-create-data-inputs">
                <div>            
                    <label for="pet-create-data-form-name">Nombre</label>
                     <input type="text" id="pet-create-data-form-name" required>
                 </div>

                <div>            
                    <label for="pet-create-data-form-especie">Especie</label>
                    <select id="pet-create-data-form-especie"></select>
                </div>

                 <div>            
                    <label for="pet-create-data-form-raza">Raza</label>
                     <select id="pet-create-data-form-raza" required></select>
                 </div>

                 <div>
                    <label for="pet-create-data-form-sexo">Sexo</label>
                    <select id="pet-create-data-form-sexo" required></select>
                 </div>

                <div>            
                    <label for="pet-create-data-form-birth">Fecha de nacimiento</label>
                    <input type="number" id="pet-create-data-form-birth">
                </div>

                <div>           
                    <label for="pet-create-data-form-tamano">Tamaño</label>
                    <select id="pet-create-data-form-tamano" required></select>
                </div>

                <div>            
                    <label for="pet-create-data-form-peso">Peso</label>
                    <input type="number" id="pet-create-data-form-peso">
                </div>

                <div>           
                    <label for="pet-create-data-form-color">Colores</label>
                    <select id="pet-create-data-form-color" required></select>
                </div>
                    
                <div>            
                    <label for="pet-create-data-form-chip">¿Tiene chip?</label>
                    <select id="pet-create-data-form-chip"></select>
                </div>
            </div>
        </div>

        <div class="pet-create-data-section">
            <div class="pet-create-title">
                <img src="../assets/icons/solar--camera-linear.png">
                <h3>Fotos de la mascota</h3>
            </div>

            <label for="pet-create-data-foto">Sube las mejores fotos de tu mascota para que sea más fácil reconocerla</label>
            <div class="foto-div">            
                <img src="../assets/icons/proicons--photo.png" alt="Subir foto" id="upload-icon">
                <span id="file-name-label">Haz clic para seleccionar o arrastra una imagen</span>
                <input type="file" id="pet-create-data-foto" accept="image/*">
                <img id="preview-img">
            </div>
        </div>

        <div class="pet-create-data-section">
            <div class="pet-create-title">
                <img src="../assets/icons/iconoir--post.png">
                <h3>Detalles del suceso</h3>
            </div>

            <div class="pet-create-data-inputs">
                <div>            
                    <label for="pet-create-data-form-date">¿Cuándo has visto a tu mascota por última vez?</label>
                     <input type="date" id="pet-create-data-form-date" required>
                </div>

                <div class="pet-create-data-location">            
                    <label for="pet-create-data-form-loc">¿Dónde has visto a tu mascota por última vez?</label>
                    <input type="" id="pet-create-data-form-loc" placeholder="Escribe una dirección">
                    <button class="button-primary" type="button" id="pet-create-data-search-btn">Buscar en mapa</button>
                </div>
                <div><pet-map id="pet-create-data-map"></pet-map></div>
                <input type="hidden" name="latitud" id="pet-create-data-lat-input" required>
                <input type="hidden" name="longitud" id="pet-create-data-lng-input" required>

                <div>            
                    <label for="pet-create-data-form-descripcion">Descripción</label>
                    <textarea id="pet-create-data-form-descripcion" required> </textarea>
                </div>
                
                <label class="reward-input">
                    <input type="checkbox" id="reward-check" required>
                    Ofrecer recompensa por recuperación
                </label>
            </div>
        </div>


        <div class="pet-create-data-buttons">
            <button type="button" class="button-secondary" id="pet-create-data-btn-reset">Limpiar</button>
            <button type="submit" class="button-primary" id="pet-create-data-btn-send">PUBLICAR ANUNCIO</button> 
        </div>
    </div>
</form>


</body>
</html>
